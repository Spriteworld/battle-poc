<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="top-circle">
      <path d="M 2,50 A 48,48 0 0 1 98,50 Z"/>
    </clipPath>
  </defs>
  <!-- Top half: green base -->
  <path d="M 2,50 A 48,48 0 0 1 98,50 Z" fill="#409830"/>
  <!-- Dark green crosshatch clipped to top half circle -->
  <g clip-path="url(#top-circle)">
    <line x1="0"  y1="18" x2="100" y2="18" stroke="#206010" stroke-width="4"/>
    <line x1="30" y1="0"  x2="30"  y2="50" stroke="#206010" stroke-width="4"/>
    <line x1="50" y1="0"  x2="50"  y2="50" stroke="#206010" stroke-width="4"/>
    <line x1="70" y1="0"  x2="70"  y2="50" stroke="#206010" stroke-width="4"/>
  </g>
  <!-- Bottom half -->
  <path d="M 98,50 A 48,48 0 0 1 2,50 Z" fill="#ffffff"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#181818" stroke-width="4"/>
  <line x1="2" y1="50" x2="98" y2="50" stroke="#181818" stroke-width="4"/>
  <circle cx="50" cy="50" r="11" fill="#181818"/>
  <circle cx="50" cy="50" r="7"  fill="#ffffff"/>
</svg>
