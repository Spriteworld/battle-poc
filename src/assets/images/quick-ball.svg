<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="top-circle">
      <path d="M 2,50 A 48,48 0 0 1 98,50 Z"/>
    </clipPath>
  </defs>
  <!-- Top half: cyan base -->
  <path d="M 2,50 A 48,48 0 0 1 98,50 Z" fill="#18B8E0"/>
  <!-- Yellow diagonal slash bands clipped to top half -->
  <g clip-path="url(#top-circle)">
    <polygon points="16,50 32,50 64,0 48,0" fill="#F8E020"/>
    <polygon points="40,50 56,50 88,0 72,0" fill="#F8E020"/>
  </g>
  <!-- Bottom half -->
  <path d="M 98,50 A 48,48 0 0 1 2,50 Z" fill="#ffffff"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#181818" stroke-width="4"/>
  <line x1="2" y1="50" x2="98" y2="50" stroke="#181818" stroke-width="4"/>
  <circle cx="50" cy="50" r="11" fill="#181818"/>
  <circle cx="50" cy="50" r="7"  fill="#ffffff"/>
</svg>
