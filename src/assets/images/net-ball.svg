<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="top-circle">
      <path d="M 2,50 A 48,48 0 0 1 98,50 Z"/>
    </clipPath>
  </defs>
  <!-- Top half: teal base -->
  <path d="M 2,50 A 48,48 0 0 1 98,50 Z" fill="#1878A8"/>
  <!-- Black net grid clipped to top half -->
  <g clip-path="url(#top-circle)" stroke="#181818" stroke-width="3" fill="none">
    <!-- Horizontal arcs -->
    <path d="M 14,50 A 36,36 0 0 1 86,50"/>
    <path d="M 30,50 A 20,20 0 0 1 70,50"/>
    <!-- Vertical lines -->
    <line x1="28" y1="0" x2="28" y2="50"/>
    <line x1="50" y1="2" x2="50" y2="50"/>
    <line x1="72" y1="0" x2="72" y2="50"/>
    <!-- Diagonal lines -->
    <line x1="2"  y1="30" x2="50" y2="2"/>
    <line x1="98" y1="30" x2="50" y2="2"/>
  </g>
  <!-- Bottom half -->
  <path d="M 98,50 A 48,48 0 0 1 2,50 Z" fill="#ffffff"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#181818" stroke-width="4"/>
  <line x1="2" y1="50" x2="98" y2="50" stroke="#181818" stroke-width="4"/>
  <circle cx="50" cy="50" r="11" fill="#181818"/>
  <circle cx="50" cy="50" r="7"  fill="#ffffff"/>
</svg>
